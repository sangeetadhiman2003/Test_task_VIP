
default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: password
  pool: 5
  host: localhost
  timeout: 5000
  port: 5432


development:
  <<: *default
  database: order_system_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: order_system_test

production:
  <<: *default
  database: order_system_production
